version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    # automerge: true
    # Note: automerge is deprecated for update configs; use update-types or workflows
    labels:
      - "dependencies"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    # automerge: true
    # Note: automerge is deprecated for update configs; use update-types or workflows
    labels:
      - "dependencies"
    groups:
      dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    # automerge: true
    # Note: automerge is deprecated for update configs; use update-types or workflows
    labels:
      - "dependencies"
    groups:
      dependencies:
        patterns:
          - "*"
